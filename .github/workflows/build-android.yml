name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;24.0.8215888"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Node.js project dependencies
        run: cd nodejs-assets/nodejs-project && npm install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/24.0.8215888
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-grup-yonetici-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
