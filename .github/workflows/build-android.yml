name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> android/local.properties

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Install Node.js project dependencies
        run: cd nodejs-assets/nodejs-project && npm install --ignore-scripts

      - name: Bundle JS
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx4096m" -x bundleDebugJsAndAssets

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-grup-yonetici-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
